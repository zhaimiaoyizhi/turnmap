name: Bug report
description: Report a problem with ChatMap.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Edge version, Chrome version, etc.
  - type: input
    id: chatgpt-url-type
    attributes:
      label: ChatGPT page type
      placeholder: Normal conversation, shared conversation, temporary chat, etc.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Do not paste private conversation text or API keys.
